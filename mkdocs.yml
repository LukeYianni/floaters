site_name: Floaters TTRPG
docs_dir: .
site_description: Design knowledge base for the Floaters tabletop RPG system
site_url: https://lukeyianni.github.io/floaters/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search

nav:
  - Home: README.md
  - Core:
    - Glossary: glossary.md
    - Design Principles: design-principles.md
    - Core Mechanics: core-mechanics.md
    - Open Questions: open-questions.md
    - Rejected Ideas: rejected-ideas.md
  - Mechanics:
    - Rolling: mechanics/rolling.md
    - Character Creation: mechanics/character-creation.md
    - Advancement: mechanics/advancement.md
    - Perks: mechanics/perks.md
    - Weapons: mechanics/weapons.md
    - Weapon Tags: mechanics/weapon-tags.md
    - Weapon Moves: mechanics/weapon-moves.md
    - Equipment: mechanics/equipment.md
    - Followers: mechanics/followers.md
    - Downtime: mechanics/downtime.md
    - Clocks: mechanics/clocks.md
    - Wounds: mechanics/wounds.md
    - Drones: mechanics/drones.md
    - Enemies: mechanics/enemies.md
  - Design Log:
    - Perks: design-log/perks.md
    - Followers: design-log/followers.md
    - Advancement: design-log/advancement.md
    - Character Creation: design-log/character-creation.md
  - Setting:
    - History: setting/history.md
    - Politics: setting/politics.md
    - Planets:
      - Floaters: setting/planets/floaters.md
      - Mars: setting/planets/mars.md
      - Moon: setting/planets/moon.md
      - Venus: setting/planets/venus.md
    - Factions:
      - Ash Network: setting/factions/ash-network.md
      - Black Echo: setting/factions/black-echo.md
      - Breakers of the Word: setting/factions/breakers-of-the-word.md
      - Sapphire Reign: setting/factions/sapphire-reign.md
  - Campaign:
